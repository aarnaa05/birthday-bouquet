<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 26th Birthday Dolphin! 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f5f1ed;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            color: #2d2d2d;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
            margin-bottom: 50px;
            font-weight: normal;
        }

        .bouquet-wrapper {
            display: inline-block;
            position: relative;
        }

        .flowers-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
            flex-wrap: nowrap;
        }

        .flower {
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
            animation: fadeIn 0.8s ease-out backwards;
        }

        .flower:nth-child(1) { animation-delay: 0.1s; }
        .flower:nth-child(2) { animation-delay: 0.2s; }
        .flower:nth-child(3) { animation-delay: 0.3s; }
        .flower:nth-child(4) { animation-delay: 0.4s; }

        .flower:hover {
            transform: translateY(-10px);
        }

        /* SVG-based pixel art flowers */
        .flower svg {
            display: block;
            width: 80px;
            height: auto;
        }

        .instruction {
            color: #666;
            font-size: 0.9em;
            margin-top: 40px;
            letter-spacing: 1px;
        }

        /* Mobile responsive styles */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
                letter-spacing: 1px;
            }

            .subtitle {
                font-size: 0.9em;
                padding: 0 10px;
            }

            .flowers-container {
                flex-wrap: wrap;
                gap: 20px;
                max-width: 280px;
                margin: 0 auto;
                justify-content: center;
            }

            .flower svg {
                width: 60px;
            }

            .instruction {
                font-size: 0.8em;
                margin-top: 30px;
                padding: 0 20px;
            }

            .container {
                padding: 20px 10px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .subtitle {
                font-size: 0.85em;
            }

            .flowers-container {
                gap: 15px;
                max-width: 240px;
            }

            .flower svg {
                width: 50px;
            }

            .flower::after {
                font-size: 0.7em;
                bottom: -20px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hover tooltip */
        .flower::after {
            content: 'click me';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: #f5f1ed;
            padding: 4px 8px;
            font-size: 0.75em;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            pointer-events: none;
        }

        .flower:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
